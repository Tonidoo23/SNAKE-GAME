<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multiplayer Snake</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>🐍 Multiplayer Snake</h1>
      <p>
        Spieler 1: <strong>WASD</strong> · Spieler 2: <strong>Pfeiltasten</strong> ·
        Wände sind harmlos (Wrap-around)
      </p>
      <canvas id="game" width="600" height="600" aria-label="Snake Spielfeld"></canvas>
      <div class="hud">
        <span id="scoreP1">P1 Punkte: 0</span>
        <span id="scoreP2">P2 Punkte: 0</span>
      </div>
      <p id="status">Drücke eine Taste, um zu starten.</p>
      <button id="restart" type="button">Neu starten</button>
    </main>
    <script src="game.js"></script>
  </body>
</html>
